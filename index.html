<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<title>micro:bit 테스트</title>

<style>

body{

    font-family:sans-serif;

    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;

    height:100vh;

    background:#f2f2f2;
}

button{

    width:200px;

    height:60px;

    margin:10px;

    font-size:24px;

    border:none;

    border-radius:15px;

    cursor:pointer;
}

</style>

</head>

<body>

<h1>micro:bit BLE 테스트</h1>

<button onclick="connectBluetooth()">
블루투스 연결
</button>

<button onclick="sendText('F')">
F 보내기
</button>

<button onclick="sendText('HELLO')">
HELLO 보내기
</button>

<script>

let txCharacteristic

async function connectBluetooth(){

    try{

        console.log("연결 시작")

        const device =
            await navigator.bluetooth.requestDevice({

            acceptAllDevices:true,

            optionalServices:[
                '6e400001-b5a3-f393-e0a9-e50e24dcca9e'
            ]

        })

        console.log("장치 선택 완료")

        const server =
            await device.gatt.connect()

        console.log("GATT 연결 완료")

        await new Promise(resolve =>
            setTimeout(resolve, 1500)
        )

        const service =
            await server.getPrimaryService(
                '6e400001-b5a3-f393-e0a9-e50e24dcca9e'
            )

        console.log("UART 서비스 연결 완료")

        txCharacteristic =
            await service.getCharacteristic(
                '6e400002-b5a3-f393-e0a9-e50e24dcca9e'
            )

        console.log("TX characteristic 연결 완료")

        alert("연결 성공!")

    }

    catch(error){

        console.log(error)

        alert(error)

    }

}

async function sendText(text){

    if(!txCharacteristic){

        alert("먼저 연결하세요")

        return
    }

    const encoder = new TextEncoder()

    try{

        await txCharacteristic.writeValueWithoutResponse(
            encoder.encode(text + "\n")
        )

        console.log("전송 성공:", text)

    }

    catch(error){

        console.log(error)

        alert(error)

    }

}

</script>

</body>

</html>
