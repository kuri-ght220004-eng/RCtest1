<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Complex RC Controller</title>
</head>
<body>

<button onclick="connect()">연결</button>
<button onclick="send('I')">×i</button>
<button onclick="send('N')">×(-i)</button>
<button onclick="send('B')">×(-1)</button>
<button onclick="send('F')">전진</button>

<script>
let characteristic;

async function connect() {
  const device = await navigator.bluetooth.requestDevice({
    filters: [{ namePrefix: "BBC micro:bit" }],
    optionalServices: ['6e400001-b5a3-f393-e0a9-e50e24dcca9e']
  });

  const server = await device.gatt.connect();

  const service = await server.getPrimaryService(
    '6e400001-b5a3-f393-e0a9-e50e24dcca9e'
  );

  characteristic = await service.getCharacteristic(
    '6e400002-b5a3-f393-e0a9-e50e24dcca9e'
  );

  alert("연결 완료");
}

async function send(text) {
  const encoder = new TextEncoder();
  await characteristic.writeValue(encoder.encode(text));
}
</script>

</body>
</html>
