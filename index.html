<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>micro:bit RC카 리모컨</title>

<style>

body{

    margin:0;
    height:100vh;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    background:#f2f4f7;

    font-family:sans-serif;
}

h1{
    margin-bottom:10px;
}

#status{
    margin-bottom:20px;
    font-size:20px;
}

.connect{

    width:220px;
    height:60px;

    font-size:22px;

    border:none;
    border-radius:15px;

    background:#4caf50;
    color:white;

    margin-bottom:30px;

    cursor:pointer;
}

.grid{

    display:grid;

    grid-template-columns:100px 100px 100px;
    grid-template-rows:100px 100px 100px;

    gap:12px;
}

button{

    border:none;

    border-radius:20px;

    font-size:35px;

    cursor:pointer;

    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.forward{ background:#42a5f5; color:white; }
.backward{ background:#66bb6a; color:white; }
.left{ background:#ffb300; color:white; }
.right{ background:#ab47bc; color:white; }
.stop{ background:#ef5350; color:white; }

.empty{
    visibility:hidden;
}

</style>

</head>

<body>

<h1>🚗 RC카 리모컨</h1>

<div id="status">
연결되지 않음
</div>

<button class="connect"
        onclick="connectBluetooth()">

블루투스 연결

</button>

<div class="grid">

<div class="empty"></div>

<button class="forward"
        onclick="sendCommand('F')">

↑

</button>

<div class="empty"></div>

<button class="left"
        onclick="sendCommand('L')">

←

</button>

<button class="stop"
        onclick="sendCommand('S')">

■

</button>

<button class="right"
        onclick="sendCommand('R')">

→

</button>

<div class="empty"></div>

<button class="backward"
        onclick="sendCommand('B')">

↓

</button>

<div class="empty"></div>

</div>

<script>

let uartCharacteristic

async function connectBluetooth(){

    try{

        document.getElementById("status")
        .innerText = "연결 중..."

        const device =
            await navigator.bluetooth.requestDevice({

            acceptAllDevices:true,

            optionalServices:[
                '6e400001-b5a3-f393-e0a9-e50e24dcca9e'
            ]

        })

        const server =
            await device.gatt.connect()

        await new Promise(resolve =>
            setTimeout(resolve, 1000)
        )

        const service =
            await server.getPrimaryService(
                '6e400001-b5a3-f393-e0a9-e50e24dcca9e'
            )

        uartCharacteristic =
            await service.getCharacteristic(
                '6e400002-b5a3-f393-e0a9-e50e24dcca9e'
            )

        document.getElementById("status")
        .innerText = "✅ 연결 성공"

    }

    catch(error){

        console.log(error)

        document.getElementById("status")
        .innerText = "❌ 연결 실패"

    }

}

async function sendCommand(cmd){

    if(!uartCharacteristic){

        alert("먼저 블루투스를 연결하세요!")

        return
    }

    const encoder = new TextEncoder()

    await uartCharacteristic.writeValue(
        encoder.encode(cmd + "\n")
    )

    console.log("보낸 명령:", cmd)

}

</script>

</body>
</html>
